services:
  db:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mc_nav
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d mc_nav"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
  mqtt:
    image: eclipse-mosquitto:latest
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
    ports:
      - "1884:1883"
      - "9001:9001"

  backend:
    build: ./backend
    env_file:
      - .env
    ports:
      - "3001:3001"
    depends_on:
      - db
      - mqtt

  frontend:
    build: ./frontend
    ports:
      - "88:80"
    depends_on:
      - backend

volumes:
  db_data: